<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vectiba — For dealers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');
  :root{--bg:#FFFFFF;--card:#FFFFFF;--sand:#F3EEE3;--panel:#F0EADD;--line:#EAE4D8;--txt:#183028;--sub:#5F6B62;--green:#135A4B;--emerald:#0B7A5A;--emerald2:#0A6A4E;--gold:#BE8B39;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
  img{display:block;max-width:100%}
  /* header (emerald) */
  .topbar{background:var(--emerald);color:#fff}
  .toprow{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto;height:58px;padding:0 22px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px;color:#fff}
  .logochip{width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logochip img{height:19px}
  .fordealer{font-size:11px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:3px 10px;letter-spacing:.5px}
  .topnav{margin-left:auto;display:flex;gap:20px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.85)}
  .topnav .on{color:#fff;font-weight:700;border-bottom:2px solid #fff;padding-bottom:2px}
  /* filter bar (white, sticky) */
  .filterbar{position:sticky;top:0;z-index:10;background:var(--sand);border-bottom:1px solid var(--line);padding:12px 22px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;max-width:1200px;margin:0 auto}
  .filters select,.filters input{font-family:inherit;font-size:13px;color:var(--txt);background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-weight:500}
  .filters .search{flex:1;min-width:160px}
  .wrap{max-width:1200px;margin:0 auto;padding:18px 22px 44px}
  /* grid (airbnb-ish) */
  .rowhead{display:flex;align-items:center;gap:8px;margin:22px 0 14px}
  .rowhead h3{margin:0;font-size:20px;font-weight:800;letter-spacing:-.4px}
  .row{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(236px,1fr);gap:18px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x proximity}
  .row::-webkit-scrollbar{height:7px}.row::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .cardc{cursor:pointer;scroll-snap-align:start}
  .cardimg{position:relative;aspect-ratio:20/15;background:var(--panel);border-radius:14px;overflow:hidden}
  .cardimg img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
  .cardc:hover .cardimg img{transform:scale(1.04)}
  .badge{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.94);color:var(--emerald);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .heart{position:absolute;top:9px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
  .timer{position:absolute;bottom:10px;left:10px;background:rgba(24,48,40,.82);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .cardbody{padding:10px 2px 4px}
  .cardtitle{font-size:15px;font-weight:700;line-height:1.25}
  .cardmeta{font-size:13px;color:var(--sub);margin:2px 0 3px}
  .bidcnt{font-size:12.5px;color:var(--emerald);font-weight:600}
  /* detail */
  #detail{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--emerald);font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:16px;padding:0}
  .dgrid{display:grid;grid-template-columns:1fr 344px;gap:30px;align-items:start}
  @media(max-width:900px){.dgrid{grid-template-columns:1fr}}
  .photobox{display:flex;gap:10px;align-items:flex-start}
  .mainphoto{flex:0 0 auto;width:400px;max-width:58%;aspect-ratio:4/3;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--panel);cursor:zoom-in;position:relative}
  .mainphoto img{width:100%;height:100%;object-fit:cover}
  .mainphoto .zoom{position:absolute;bottom:10px;right:10px;background:rgba(24,48,40,.8);color:#fff;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px}
  .thumbgrid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:flex-start}
  .thumbgrid img{aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1.5px solid var(--line);cursor:pointer}
  .thumbgrid img.sel{border-color:var(--emerald)}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 6px}
  .chk{background:#E7F3EE;color:var(--emerald);font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px}
  .dtitle{font-size:24px;font-weight:800;margin:8px 0 2px}
  .dsub{color:var(--sub);font-size:14px}
  .specs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
  @media(max-width:560px){.specs{grid-template-columns:repeat(2,1fr)}.mainphoto{width:100%;max-width:100%}.photobox{flex-direction:column}}
  .spec{background:var(--sand);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .spec .k{font-size:11.5px;color:var(--sub)}
  .spec .v{font-size:15px;font-weight:700}
  /* bid panel (right, heydealer-style) */
  .bidpanel{border:1px solid var(--line);border-radius:16px;padding:18px;position:sticky;top:80px;background:var(--card)}
  .aucrow{display:flex;justify-content:space-between;align-items:center}
  .aucrow .st{color:var(--emerald);font-weight:800;font-size:15px}
  .aucrow .views{color:var(--sub);font-size:12.5px}
  .timer2{font-size:24px;font-weight:800;letter-spacing:1px;margin:2px 0 12px;font-variant-numeric:tabular-nums}
  .sealed{font-size:12px;color:var(--sub);background:var(--panel);border-radius:9px;padding:8px 10px;margin-bottom:14px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:5px}
  .fld select,.fld input{width:100%;font-family:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--txt);font-weight:600}
  .toggle{display:flex;gap:6px}
  .toggle button{flex:1;font-family:inherit;font-size:12.5px;font-weight:600;border:1.5px solid var(--line);background:#fff;color:var(--sub);border-radius:9px;padding:9px;cursor:pointer}
  .toggle button.on{border-color:var(--emerald);background:#E7F3EE;color:var(--emerald)}
  .feesbar{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--sand);border:1.5px solid var(--line);border-radius:10px;padding:12px 13px;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--txt);cursor:pointer;margin-bottom:12px}
  .feesbar b{color:var(--emerald);font-size:15px}
  .lines{border-top:1px dashed var(--line);margin-top:6px;padding-top:12px}
  .line{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:var(--sub)}
  .line b{color:var(--txt);font-weight:600}
  .total{border-top:1px solid var(--line);margin-top:6px;padding-top:12px}
  .total .big{display:flex;justify-content:space-between;align-items:baseline}
  .total .big .lbl{font-size:13px;color:var(--sub)}
  .total .big .amt{font-size:22px;font-weight:800;color:var(--emerald)}
  .total .eur{text-align:right;font-size:12px;color:var(--sub);margin-top:2px}
  .fx{font-size:11px;color:var(--sub);margin-top:8px}
  .submit{width:100%;background:var(--emerald);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:15px;padding:13px;border-radius:11px;cursor:pointer;margin-top:14px}
  .submit:hover{background:var(--emerald2)}
  .done{display:none;text-align:center;background:#E7F3EE;color:var(--emerald);font-weight:700;font-size:13.5px;padding:14px;border-radius:11px;margin-top:14px}
  .note{font-size:11px;color:var(--sub);text-align:center;margin-top:10px}
  /* lightbox */
  .lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:center;justify-content:center}
  .lb.on{display:flex}
  .lb img{max-width:90%;max-height:86%;border-radius:10px}
  .lb .x{position:absolute;top:16px;right:26px;color:#fff;font-size:30px;cursor:pointer;line-height:1}
  .lb .nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:46px;cursor:pointer;padding:0 22px;user-select:none;opacity:.85}
  .lb .prev{left:6px}.lb .next{right:6px}
  /* mobile (kept at end so it overrides base rules) */
  @media(max-width:600px){
    .topnav{display:none}
    .toprow{height:52px;padding:0 14px}
    .filterbar{padding:10px 14px}
    .wrap{padding:14px 14px 34px}
    .row{grid-auto-flow:row!important;grid-template-columns:1fr!important;grid-auto-columns:auto!important;overflow:visible}
    .rowhead h3{font-size:17px}
    .dgrid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="toprow">
    <span class="brand"><span class="logochip"><img src="../img/vectiba-logo.png" alt="Vectiba"/></span> Vectiba</span>
    <span class="fordealer" id="t_fordealer">FOR DEALERS</span>
    <span class="topnav"><span class="on" id="t_nav1">경매장</span><span id="t_nav2">내 입찰</span><span id="t_nav3">매입시세</span></span>
  </div>
</div>
<div class="filterbar">
  <div class="filters">
    <input class="search" id="f_search" oninput="applyFilters()"/>
    <select id="f_brand" onchange="applyFilters()"></select>
    <select id="f_year" onchange="applyFilters()"></select>
    <select id="f_km" onchange="applyFilters()"></select>
    <select id="f_origin" onchange="applyFilters()"></select>
  </div>
</div>

<div class="wrap">
  <div id="browse"></div>

  <div id="detail">
    <button class="back" onclick="showBrowse()">← <span id="t_back">목록으로</span></button>
    <div class="dgrid">
      <div class="dleft">
        <div class="photobox">
          <div class="mainphoto" onclick="openLB(curIdx)"><img id="mainImg" src="" alt=""/><span class="zoom" id="t_zoom">🔍 크게 보기</span></div>
          <div class="thumbgrid" id="thumbgrid"></div>
        </div>
        <div class="badges" id="badges"></div>
        <div class="dtitle" id="dTitle"></div>
        <div class="dsub" id="dSub"></div>
        <div class="specs" id="specs"></div>
      </div>

      <div class="bidpanel">
        <div class="aucrow"><span class="st" id="t_auction">경매 중</span><span class="views" id="views"></span></div>
        <div class="timer2" id="timer2">00:00:00</div>
        <div class="sealed" id="t_sealed">🔒 밀봉 경매 — 다른 딜러의 견적은 보이지 않습니다.</div>

        <div class="fld">
          <label id="t_l_dest">도착지 (내 나라 · 항구)</label>
          <select id="dest" onchange="destChanged()"></select>
        </div>
        <div class="fld">
          <label id="t_l_ccy">표시 통화</label>
          <select id="ccy" onchange="calc()"></select>
        </div>
        <div class="fld">
          <label id="t_l_road">로드탁송</label>
          <div class="toggle">
            <button id="carrier" class="on" onclick="setRoad('carrier')">🚛 <span id="t_carrier">캐리어</span></button>
            <button id="driver" onclick="setRoad('driver')">🧑‍✈️ <span id="t_driver">기사운행</span></button>
          </div>
        </div>
        <button type="button" class="feesbar" onclick="toggleFees()">
          <span id="t_fees">부가비용 합계</span>
          <span><b id="feesSum">—</b> <span id="feesArrow" style="margin-left:6px">▾</span></span>
        </button>
        <div class="lines" id="lines" style="display:none"></div>

        <div class="fld">
          <label id="t_l_bid">내 입찰가 (EUR)</label>
          <input id="bid" type="number" min="0" value="0" oninput="calc()"/>
        </div>

        <div class="total">
          <div class="big"><span class="lbl" id="t_endcost">예상 도착가 (엔드코스트)</span><span class="amt" id="totAmt">—</span></div>
          <div class="eur" id="totEur"></div>
        </div>
        <div class="fx" id="fx"></div>

        <button class="submit" id="t_submit" onclick="submitBid()">입찰하기</button>
        <div class="done" id="done">✓ <span id="t_done">입찰이 제출되었습니다. 마감 후 셀러가 최고가를 선택합니다.</span></div>
        <div class="note" id="t_note">숫자·환율은 예시입니다 · 실서비스는 실제 요율·관세 데이터로 계산됩니다.</div>
      </div>
    </div>
  </div>
</div>

<div class="lb" id="lb"><span class="x" onclick="closeLB()">✕</span><span class="nav prev" onclick="lbStep(-1)">‹</span><img id="lbImg" src="" alt=""/><span class="nav next" onclick="lbStep(1)">›</span></div>

function renderBrowse(){
  var byId=function(id){return CARS.find(function(x){return x.id===id})};
  var r1=["bmw_g30","landcruiser","peugeot","gclass","renault","eclass","rav4","patrol"].map(byId);
  var r2=["hilux","lexus_lx","landcruiser","patrol"].map(byId);
  var r3=["bmw_g30","gclass","eclass","bmw_x5","gle"].map(byId);
  document.getElementById('browse').innerHTML=rowHTML(D.row1,r1)+rowHTML(D.row2,r2)+rowHTML(D.row3,r3);
  syncFrameH();
}
function originVal(c){return COUNTRY[c.country].flag+' '+ctryName(c.country);}
function initFilters(){
  var g=function(id){return document.getElementById(id)};
  g('f_search').placeholder=D.search;
  var brands=[];CARS.forEach(function(c){if(brands.indexOf(c.br)<0)brands.push(c.br)});
  g('f_brand').innerHTML='<option value="">'+D.f_all_brand+'</option>'+brands.map(function(b){return '<option>'+b+'</option>'}).join('');
  var ors=[];CARS.forEach(function(c){var v=originVal(c);if(ors.indexOf(v)<0)ors.push(v)});
  g('f_origin').innerHTML='<option value="">'+D.f_all_origin+'</option>'+ors.map(function(o){return '<option>'+o+'</option>'}).join('');
  g('f_year').innerHTML='<option value="">'+D.f_all_year+'</option><option>2022+</option><option>2020+</option><option>2018+</option>';
  g('f_km').innerHTML='<option value="">'+D.f_all_km+'</option><option>~50,000km</option><option>~80,000km</option>';
}
function applyFilters(){
  var g=function(id){return document.getElementById(id)};
  var q=(g('f_search').value||'').toLowerCase().trim();
  var br=g('f_brand').value,yr=g('f_year').value,km=g('f_km').value,og=g('f_origin').value;
  if(!(q||br||yr||km||og)){renderBrowse();return;}
  var list=CARS.filter(function(c){
    var name=(L==='ko'?c.nameKo:c.name).toLowerCase();
    if(q&&name.indexOf(q)<0&&c.br.toLowerCase().indexOf(q)<0)return false;
    if(br&&c.br!==br)return false;
    if(og&&originVal(c)!==og)return false;
    if(yr&&c.y<parseInt(yr,10))return false;
    if(km){var mx=parseInt(km.replace(/[^0-9]/g,''),10);if(c.km>mx)return false;}
    return true;
  });
  var html='<div class="rowhead"><h3>'+D.result+' '+list.length+D.cars+'</h3></div>';
  html+=list.length?'<div class="row" style="grid-auto-flow:row;grid-template-columns:repeat(auto-fill,minmax(236px,1fr));overflow:visible">'+list.map(cardHTML).join('')+'</div>':'<p style="color:var(--sub);padding:24px 0">'+D.noresult+'</p>';
  document.getElementById('browse').innerHTML=html;
  syncFrameH();
}

function curDest(){return DEST.find(function(d){return d.k===document.getElementById('dest').value});}
function destChanged(){document.getElementById('ccy').value=curDest().ccy;calc();}
function roadLabel(){
  var e=CUR?COUNTRY[CUR.country].cities[L]||COUNTRY[CUR.country].cities.en:null; if(!e){return D.road;}
  return D.road+' ('+e[0]+' → '+e[1]+')';
}
function calc(){
  if(!CUR)return;
  document.getElementById('t_l_road').textContent=roadLabel();
  var d=curDest(),ccy=document.getElementById('ccy').value;
  var bid=Math.max(0,parseFloat(document.getElementById('bid').value)||0);
  var road=ROAD[roadMode],duty=bid*d.duty/100;
  var parts=[["road",road],["storage",d.storage],["docs",d.docs],["freight",d.freight],["duty",duty]];
  var feesEUR=road+d.storage+d.docs+d.freight+duty;
  var totalEUR=bid+feesEUR;
  var rate=(RATES&&RATES[ccy])?RATES[ccy]:FALLBACK[ccy];
  var lines=document.getElementById('lines');lines.innerHTML='';
  parts.forEach(function(p){var lbl=D.ln[p[0]];if(p[0]==="duty")lbl+=" ("+d.duty+"%)";
    lines.innerHTML+='<div class="line"><span>'+lbl+'</span><b>'+euro(p[1])+'</b></div>';});
  document.getElementById('feesSum').textContent=euro(feesEUR);
  document.getElementById('totAmt').textContent=ccy+" "+money(totalEUR*rate);
  document.getElementById('totEur').textContent="≈ "+euro(totalEUR);
  document.getElementById('fx').textContent=(L==='ko'?"환율: ":"FX: ")+"1 EUR = "+rate.toFixed(rate>50?0:2)+" "+ccy+" · "+FXDATE;
}
function submitBid(){document.getElementById('t_submit').style.display='none';document.getElementById('done').style.display='block';}
function loadFX(){
  fetch('https://open.er-api.com/v6/latest/EUR').then(function(r){return r.json()}).then(function(j){
    if(j&&j.rates){RATES=j.rates;FXDATE=(j.time_last_update_utc||'').slice(5,16)||'ECB';if(CUR)calc();}
  }).catch(function(){FXDATE=(L==='ko'?"예시 환율":"sample FX");});
}

function destLabel(d){
  var name=destName(d.country), port=destPort(d.country), flag=DCTRY[d.country].flag;
  var suffix=(d.rail&&DCTRY[d.country].railSuffix)?(' '+(DCTRY[d.country].railSuffix[L]||DCTRY[d.country].railSuffix.en)):'';
  return flag+' '+name+' · '+port+suffix;
}

/* embedded in the marketing site as an iframe with no fixed height of its own — keep the
   outer <iframe> exactly as tall as this page's actual content so there's no nested scrollbar.
   Called explicitly wherever the visible content changes size, rather than relying solely on
   ResizeObserver timing. Uses body.scrollHeight (not documentElement.scrollHeight, which gets
   pinned to whatever height we last set on the iframe and can never report a shrink). */
function syncFrameH(){ if(window.frameElement) window.frameElement.style.height = document.body.scrollHeight + 'px'; }
if(window.frameElement){
  new ResizeObserver(syncFrameH).observe(document.body);
  window.addEventListener('load', syncFrameH);
  syncFrameH();
}
