<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Vectiba Business Card — Back (90×50mm @300dpi)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Hanken+Grotesk:wght@500&display=swap');
  /* 90mm × 50mm at 300dpi = 1063 × 591 px */
  html,body{margin:0;padding:0}
  body{width:1063px;height:591px;background:#12564B;overflow:hidden;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px}
  /* Same VLogo badge as the app — cream circle reads naturally on emerald */
  svg{width:190px;height:190px}
  .wordmark{font-family:'Poppins',sans-serif;font-weight:600;font-size:88px;
            color:#FBF6EC;letter-spacing:-1.5px;line-height:1}
  .tagline{font-family:'Hanken Grotesk',sans-serif;font-weight:500;font-size:30px;
           color:#E3B25F;margin-top:6px}
</style>
</head>
<body>
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VECTIBA">
    <circle cx="100" cy="100" r="100" fill="#f8f5ee"/>
    <g transform="translate(-24.5,-29.375) scale(0.75)">
      <path d="M94 120 L124 120 L152 181 L139 209 Z" fill="#12564B"/>
      <path d="M207 96 L238 93 L172 216 L152 252 L142 216 Z" fill="#12564B"/>
    </g>
  </svg>
  <div class="wordmark">Vectiba</div>
  <div class="tagline">We connect people who could never meet — with AI.</div>
</body>
</html>
